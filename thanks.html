<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Readiness Intake Submitted</title>
<link rel="icon" href="assets/gamma-logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0F2F44;
  --primary-light: #133F5C;
  --accent: #017ED7;
  --accent-hover: #0069AF;
  --accent-bg: #EEF8FE;
  --good-bg: #E8F5E9;
  --good-border: #A5D6A7;
  --text: #393939;
  --text-light: #5A5A5A;
  --bg: #FAFAFA;
  --card: #FFFFFF;
  --shadow: 0 8px 32px rgba(15,47,68,0.10);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
}

.card {
  width: min(100%, 720px);
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.top {
  background: linear-gradient(135deg, #0F2F44 0%, #133F5C 100%);
  color: white;
  padding: 28px 32px;
}

.top img {
  height: 38px;
  width: auto;
  display: block;
  margin-bottom: 18px;
}

.top h1 {
  font-size: 26px;
  line-height: 1.2;
  letter-spacing: 0;
}

.body {
  padding: 30px 32px;
}

.notice {
  background: linear-gradient(135deg, #E8F5E9 0%, #EEF8FE 100%);
  border: 2px solid var(--good-border);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  margin-bottom: 18px;
}

p {
  color: var(--text-light);
  font-size: 15px;
  line-height: 1.6;
}

a {
  display: inline-block;
  margin-top: 22px;
  background: var(--accent);
  color: white;
  text-decoration: none;
  padding: 12px 18px;
  border-radius: var(--radius-sm);
  font-weight: 800;
}

a:hover {
  background: var(--accent-hover);
}
</style>
</head>
<body>
  <main class="card">
    <div class="top">
      <img src="assets/gamma-logo.svg" alt="Gamma Tech">
      <h1>Thanks, your intake was submitted.</h1>
    </div>
    <div class="body">
      <div class="notice">
        <p>We received your answers and will use them to prepare for the AI planning conversation with Quality Enterprises.</p>
      </div>
      <p>If anything important was missed, just send it to the person who shared this form and we will include it in the review.</p>
      <a href="index.html">Back to the form</a>
    </div>
  </main>
</body>
</html>
